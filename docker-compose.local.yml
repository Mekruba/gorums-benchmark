services:
  srv1:
    build:
      context: .
      dockerfile: src/Dockerfile.Server
    network_mode: "host"
    environment:
      - ID=1
      - SERVER=1
      - CONF=${CONF:-local}
      - PRODUCTION=${PRODUCTION:-1}
      - BENCH=${BENCH}
      - LOG=${LOG:-0}
    volumes:
      - ./logs:/app/logs

  srv2:
    build:
      context: .
      dockerfile: src/Dockerfile.Server
    network_mode: "host"
    environment:
      - ID=2
      - SERVER=1
      - CONF=${CONF:-local}
      - PRODUCTION=${PRODUCTION:-1}
      - BENCH=${BENCH}
      - LOG=${LOG:-0}
    volumes:
      - ./logs:/app/logs

  srv3:
    build:
      context: .
      dockerfile: src/Dockerfile.Server
    network_mode: "host"
    environment:
      - ID=3
      - SERVER=1
      - CONF=${CONF:-local}
      - PRODUCTION=${PRODUCTION:-1}
      - BENCH=${BENCH}
      - LOG=${LOG:-0}
    volumes:
      - ./logs:/app/logs

  srv4:
    build:
      context: .
      dockerfile: src/Dockerfile.Server
    network_mode: "host"
    environment:
      - ID=4
      - SERVER=1
      - CONF=${CONF:-local}
      - PRODUCTION=${PRODUCTION:-1}
      - BENCH=${BENCH}
      - LOG=${LOG:-0}
    volumes:
      - ./logs:/app/logs

  client:
    build:
      context: .
      dockerfile: src/Dockerfile.Client
    network_mode: "host"
    environment:
      - SERVER=0
      - CONF=${CONF:-local}
      - PRODUCTION=${PRODUCTION:-1}
      - BENCH=${BENCH}
      - THROUGHPUT=${THROUGHPUT}
      - STEPS=${STEPS}
      - RUNS=${RUNS}
      - DUR=${DUR}
      - LOG=${LOG:-0}
    volumes:
      - ./logs:/app/logs
      - ./csv:/app/src/csv
    depends_on:
      - srv1
      - srv2
      - srv3
      - srv4
