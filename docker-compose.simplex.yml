services:
  server:
    build:
      context: .
      dockerfile: src/Dockerfile.Server
    network_mode: "host"
    environment:
      - ID=${ID}
      - SERVER=1
      - CONF=${CONF:-simplex}
      - PRODUCTION=${PRODUCTION:-1}
      - BENCH=${BENCH}
      - LOG=${LOG:-0}
    volumes:
      - ./logs:/app/logs

  client:
    build:
      context: .
      dockerfile: src/Dockerfile.Client
    network_mode: "host"
    environment:
      - SERVER=0
      - CONF=${CONF:-simplex}
      - PRODUCTION=${PRODUCTION:-1}
      - BENCH=${BENCH}
      - THROUGHPUT=${THROUGHPUT}
      - STEPS=${STEPS:-1}
      - RUNS=${RUNS:-1}
      - DUR=${DUR}
      - LOG=${LOG:-0}
    volumes:
      - ./logs:/app/logs
      - ./csv:/app/src/csv
