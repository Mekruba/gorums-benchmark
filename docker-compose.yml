services:
  srv1:
    image: my-bench-server:latest
    build: 
      context: .
      dockerfile: src/Dockerfile.Server
    networks:
      - MasterLab
    ports:
      - target: 5000
        published: 5000
        protocol: tcp
        mode: host
    environment:
      - ID=1
      - SERVER=1
      - CONF=${CONF}
      - PRODUCTION=${PRODUCTION}
      - BENCH=${BENCH}
      - LOG=${LOG}
    volumes:
      - /home/ubuntu/gorums-benchmark/logs:/app/logs
    deploy:
      placement:
        constraints: [node.hostname == node-1]

  srv2:
    image: my-bench-server:latest
    build: 
      context: .
      dockerfile: src/Dockerfile.Server
    networks:
      - MasterLab
    ports:
      - target: 5000
        published: 5000
        protocol: tcp
        mode: host
    environment:
      - ID=2
      - SERVER=1
      - CONF=${CONF}
      - PRODUCTION=${PRODUCTION}
      - BENCH=${BENCH}
      - LOG=${LOG}
    volumes:
      - /home/ubuntu/gorums-benchmark/logs:/app/logs
