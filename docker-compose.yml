services:
  srv1:
    image: my-bench-server:latest
    build:
      context: .
      dockerfile: src/Dockerfile.Server
    network_mode: "host"
    environment:
      - ID=1
      - SERVER=1
      - CONF=${CONF:-local}
      - BENCH=${BENCH}
      - LOG=${LOG:-0}
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8080"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 5s

