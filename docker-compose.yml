services:
  srv1:
    image: my-bench-server:latest
    build:
      context: .
      dockerfile: src/Dockerfile.Server
    network_mode: "host"
    environment:
      - ID=1
      - SERVER=1
      - CONF=${CONF}
      - BENCH=${BENCH}
      - LOG=${LOG}
    volumes:
      - ./logs:/app/logs

