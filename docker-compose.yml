    image: my-bench-client:latest
    build:
      context: .
      dockerfile: src/Dockerfile.Client
    network_mode: "host"
    environment:
      - SERVER=0
      - CONF=${CONF}
      - BENCH=${BENCH}
      - THROUGHPUT=${THROUGHPUT}
      - STEPS=${STEPS}
      - RUNS=${RUNS}
      - DUR=${DUR}
      - LOG=${LOG}
    volumes:
      - ./logs:/app/logs
      - ./csv:/app/src/csv
