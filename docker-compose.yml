services:
  srv1:
    build: 
      context: .
      dockerfile: src/Dockerfile.Server
    network_mode: "host"
    environment:
      - ID=1
      - SERVER=1
      - CONF=${CONF}
      - PRODUCTION=${PRODUCTION}
      - BENCH=${BENCH}
      - LOG=${LOG}
    volumes:
      - ./logs:/app/src/logs
    deploy:
      placement:
        constraints: [node.hostname == node-1]

