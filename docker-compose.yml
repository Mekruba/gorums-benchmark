  client:
    image: my-bench-client:latest
    build: 
      context: .
      dockerfile: src/Dockerfile.Client
    networks:
      - MasterLab
    environment:
      - SERVER=0
      - CONF=${CONF}
      - PRODUCTION=${PRODUCTION}
      - BENCH=${BENCH}
      - THROUGHPUT=${THROUGHPUT}
      - STEPS=${STEPS}
      - RUNS=${RUNS}
      - DUR=${DUR}
      - LOG=${LOG}
    volumes:
      - /home/ubuntu/gorums-benchmark/logs:/app/logs
      - /home/ubuntu/gorums-benchmark/csv:/app/src/csv
    deploy:
      placement:
        constraints: [node.hostname == node-1]

networks:
  MasterLab:
    external: true
